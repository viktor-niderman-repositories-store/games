<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Little Games</title>
    <link rel="stylesheet" href="libs/bootstrap.min.css">
    <script src="libs/vue.js"></script>
    <style>
        :root {
            --bg-1: #1a1740;
            --bg-2: #2c2570;
            --bg-3: #ff6b9d;
            --text: #f5f3ff;
            --muted: rgba(245, 243, 255, 0.65);
            --card-bg: rgba(255, 255, 255, 0.08);
            --card-border: rgba(255, 255, 255, 0.15);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 15% 10%, rgba(255, 107, 157, 0.35), transparent 45%),
                radial-gradient(circle at 85% 80%, rgba(94, 200, 255, 0.3), transparent 50%),
                linear-gradient(135deg, var(--bg-1), var(--bg-2));
            background-attachment: fixed;
        }

        header {
            padding: 80px 20px 40px;
            text-align: center;
        }

        header h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            margin: 0 0 16px;
            background: linear-gradient(135deg, #fff, #ffd1e1 60%, #ffb3d1);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        header p {
            font-size: 1.1rem;
            color: var(--muted);
            max-width: 560px;
            margin: 0 auto;
        }

        main {
            padding: 20px 16px 80px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 24px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .card-game {
            position: relative;
            display: flex;
            flex-direction: column;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
        }

        .card-game:hover {
            transform: translateY(-6px);
            border-color: rgba(255, 255, 255, 0.35);
            box-shadow: 0 20px 50px -20px rgba(0, 0, 0, 0.6);
            color: inherit;
        }

        .card-game .thumb {
            aspect-ratio: 1 / 1;
            background: #0e0c2a;
            overflow: hidden;
        }

        .card-game .thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .card-game:hover .thumb img {
            transform: scale(1.05);
        }

        .card-game .body {
            padding: 20px 22px 22px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .card-game .title-row {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 12px;
        }

        .card-game h3 {
            margin: 0;
            font-size: 1.35rem;
            font-weight: 700;
        }

        .card-game .year {
            font-size: 0.8rem;
            color: var(--muted);
            font-variant-numeric: tabular-nums;
        }

        .card-game .desc {
            margin: 0;
            color: var(--muted);
            font-size: 0.95rem;
            min-height: 1.2em;
        }

        .card-game .play {
            margin-top: 6px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
            color: #ffb3d1;
        }

        .card-game .play::after {
            content: "→";
            transition: transform 0.2s ease;
        }

        .card-game:hover .play::after {
            transform: translateX(4px);
        }

        footer {
            text-align: center;
            padding: 20px 16px 40px;
            color: var(--muted);
            font-size: 0.85rem;
        }

        footer a {
            color: inherit;
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div id="app">
    <header>
        <h1>Little Games</h1>
        <p>A handful of small browser games I built for fun and learning over the years.</p>
    </header>
    <main>
        <div class="grid">
            <a class="card-game"
               v-for="game in sortedGames"
               :key="game.link"
               :href="`./games/${game.link}/index.html`"
               target="_blank"
               rel="noopener">
                <div class="thumb">
                    <img :src="`./games/${game.link}/preview.png`" :alt="game.title" loading="lazy">
                </div>
                <div class="body">
                    <div class="title-row">
                        <h3>{{ game.title }}</h3>
                        <span class="year">{{ game.year }}</span>
                    </div>
                    <p class="desc">{{ game.description }}</p>
                    <span class="play">Play</span>
                </div>
            </a>
        </div>
    </main>
    <footer>
        Source on <a href="https://github.com/viktor-niderman/games" target="_blank" rel="noopener">GitHub</a>
    </footer>
</div>

<script>
    const { createApp } = Vue

    createApp({
        data() {
            return {
                gameCards: [
                    { title: 'TicTacToe',   description: 'The classic, with a twist.',     link: 'ticTacToe',   year: 2017 },
                    { title: 'Snake',       description: 'Eat, grow, do not bite yourself.', link: 'snake',     year: 2018 },
                    { title: 'Balloon',     description: 'Pop balloons as they float by.',  link: 'balloon',    year: 2018 },
                    { title: 'BarleyBreak', description: 'Sliding-tile puzzle.',             link: 'barleyBreak', year: 2016 },
                ]
            }
        },
        computed: {
            sortedGames() {
                return [...this.gameCards].sort((a, b) => b.year - a.year)
            }
        }
    }).mount('#app')
</script>
</body>
</html>
