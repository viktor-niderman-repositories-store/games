<!doctype html>
<html lang="en">
  <head>
    <title>Tic-Tac-Toe</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#15171c">
    <link rel="stylesheet" href="style.css">
    <script src="../../libs/vue.js"></script>
  </head>
  <body>
    <div id="app">
      <header class="hud">
        <div class="status">{{ status }}</div>
        <div class="score">
          <span class="score-x">You {{ score.player }}</span>
          <span class="score-draw">Draw {{ score.draw }}</span>
          <span class="score-o">CPU {{ score.pc }}</span>
        </div>
      </header>

      <div class="board" :class="{ locked: !canMakeStep || appIsReload }">
        <button
          v-for="n in 9"
          :key="n"
          class="cell"
          :class="{ 'cell-x': field[n] === symbols.player, 'cell-o': field[n] === symbols.pc }"
          @click="clickTo(n)"
        >
          <span v-if="field[n]" class="mark">{{ field[n] }}</span>
        </button>

        <transition name="banner">
          <div v-if="banner" class="banner">{{ banner }}</div>
        </transition>
      </div>
    </div>

    <script src="js.js"></script>
  </body>
</html>
