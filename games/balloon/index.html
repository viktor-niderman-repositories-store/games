<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Balloons</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #1b2a4a;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
      }
      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }
      #hud {
        position: fixed;
        top: 12px;
        left: 0;
        right: 0;
        display: flex;
        justify-content: space-between;
        padding: 0 16px;
        color: #fff;
        font-size: 20px;
        font-weight: 600;
        text-shadow: 0 2px 6px rgba(0,0,0,0.35);
        pointer-events: none;
      }
      #hud .pill {
        background: rgba(0,0,0,0.25);
        padding: 6px 14px;
        border-radius: 999px;
        backdrop-filter: blur(6px);
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div id="hud">
      <div class="pill">Score: <span id="score">0</span></div>
      <div class="pill">Best: <span id="best">0</span></div>
    </div>
    <script>
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      const scoreEl = document.getElementById("score");
      const bestEl = document.getElementById("best");

      let w = 0, h = 0, dpr = 1;
      function resize() {
        dpr = window.devicePixelRatio || 1;
        w = window.innerWidth;
        h = window.innerHeight;
        canvas.width = w * dpr;
        canvas.height = h * dpr;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }
      window.addEventListener("resize", resize);
      resize();

      const rand = (min, max) => Math.random() * (max - min) + min;
      const colors = ["green", "blue", "purp", "red", "yellow"];
      const images = colors.map(c => { const i = new Image(); i.src = c + ".png"; return i; });

      const sound = new Audio("sound.mp3");
      sound.volume = 0.4;

      let score = 0;
      let best = +localStorage.getItem("balloon_best") || 0;
      bestEl.textContent = best;

      const balloons = [];
      const pops = [];

      function balloonSize() {
        return Math.max(60, Math.min(w, h) * 0.14);
      }

      function spawn() {
        const size = balloonSize();
        balloons.push({
          x: rand(size / 2, w - size / 2),
          y: h + size,
          color: Math.floor(rand(0, 5)),
          speed: Math.random() < 0.25 ? rand(380, 550) : rand(120, 240),
          size,
          sway: rand(0, Math.PI * 2),
        });
        setTimeout(spawn, rand(900, 2200));
      }
      spawn();

      function drawBackground() {
        const g = ctx.createLinearGradient(0, 0, 0, h);
        g.addColorStop(0, "#7ec8f5");
        g.addColorStop(1, "#cfeaff");
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, w, h);
      }

      let last = performance.now();
      function step(now) {
        const dt = Math.min(0.05, (now - last) / 1000);
        last = now;

        drawBackground();

        for (let i = balloons.length - 1; i >= 0; i--) {
          const b = balloons[i];
          b.y -= b.speed * dt;
          b.sway += dt * 2;
          const dx = Math.sin(b.sway) * 6;
          const bw = b.size, bh = b.size * 1.2;
          const img = images[b.color];
          if (img.complete && img.naturalWidth) {
            ctx.drawImage(img, b.x - bw / 2 + dx, b.y - bh / 2, bw, bh);
          } else {
            ctx.fillStyle = ["#6cc070", "#4aa3df", "#9b6cd6", "#e35d5d", "#f1c40f"][b.color];
            ctx.beginPath();
            ctx.ellipse(b.x + dx, b.y, bw / 2, bh / 2, 0, 0, Math.PI * 2);
            ctx.fill();
          }
          if (b.y < -bh) balloons.splice(i, 1);
        }

        for (let i = pops.length - 1; i >= 0; i--) {
          const p = pops[i];
          p.t += dt;
          const a = 1 - p.t / 0.4;
          if (a <= 0) { pops.splice(i, 1); continue; }
          ctx.strokeStyle = `rgba(255,255,255,${a})`;
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r + p.t * 120, 0, Math.PI * 2);
          ctx.stroke();
        }

        requestAnimationFrame(step);
      }
      requestAnimationFrame(now => { last = now; step(now); });

      function pop(x, y) {
        for (let i = balloons.length - 1; i >= 0; i--) {
          const b = balloons[i];
          const dx = x - b.x, dy = y - b.y;
          const rx = b.size / 2 + 8, ry = b.size * 0.6 + 8;
          if ((dx * dx) / (rx * rx) + (dy * dy) / (ry * ry) <= 1) {
            pops.push({ x: b.x, y: b.y, r: b.size / 2, t: 0 });
            balloons.splice(i, 1);
            score++;
            scoreEl.textContent = score;
            if (score > best) {
              best = score;
              bestEl.textContent = best;
              localStorage.setItem("balloon_best", best);
            }
            try { sound.currentTime = 0; sound.play(); } catch (e) {}
            return;
          }
        }
        score = Math.max(0, score - 1);
        scoreEl.textContent = score;
      }

      function handle(e) {
        const t = e.touches ? e.touches[0] : e;
        const rect = canvas.getBoundingClientRect();
        pop(t.clientX - rect.left, t.clientY - rect.top);
      }
      canvas.addEventListener("mousedown", handle);
      canvas.addEventListener("touchstart", e => { e.preventDefault(); handle(e); }, { passive: false });
    </script>
  </body>
</html>
